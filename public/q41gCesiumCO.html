<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Q4 1st Graded Exercise">
    <meta name="keywords" content="HTML Forms">
    <meta name="author" content="VARICK CO">
    <title>Movie Reviews</title>
   <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #cbe8ff; /* Light background to make the card pop */
            padding: 40px;
        }

        h1 {
            color: #091877;
            text-align: center;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
        }
        .blur {
          border: 2px solid rgb(207, 63, 63);
          background-color: rgb(253, 109, 109);
        }
        .focus {
          border: 2px solid rgb(57, 180, 252);
          background-color: rgb(174, 229, 255);
        }        
        .buttons {
          text-align: center;
        }

        .star-rating {
            display: flex;
            flex-direction: row-reverse;
            justify-content: flex-end;
            margin-left: 40px;
            gap: 2px;
        }

        .star-rating input {
            display: none;
        }

        .star-rating label {
            font-size: 1.5rem;
            color: #c7c7c7; 
            cursor: pointer;
            transition: color 0.5s;
            margin: 0;
            padding: 0 2px;
        }

        .star-rating input:checked ~ label,
        .star-rating label:hover,
        .star-rating label:hover ~ label,
        .given-rating {
            color: #ffbf00; 
        }

        legend {
            background: rgb(230, 230, 230);
            color: rgb(37, 19, 139);
            padding: 5px;
        }

        .quiz {
            max-width: 650px;
            margin: 40px auto;
            padding: 30px;
            background: #ffffff75;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(14, 50, 92, 0.4);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .quiz button {
            width: 25%;
            padding: 8px;
            background: linear-gradient(135deg, #b8e3ff, #8ec6e7);
            border-radius: 6px;
            color: #000000;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .movie-list {
          max-width:650px;
          border: 1px solid #a8a8a8;
          margin: 10px auto;
          padding: 15px;
          background: #ffffff75;
          border-radius: 12px;
          box-shadow: 0 0 20px rgba(14, 50, 92, 0.4);
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
       
    </style>
    
  </head>
  <body>
    <section>
      <h1>Add a Movie</h1>

      <form id="dForm" method="post" onsubmit = "confirmSubmission(event)">
        <div class="quiz">
          <legend>Movie Details</legend><br/>
          <label> Title: <br/>
            <input type="text" name="title" id="title" required onblur = "bblur(this)" onfocus = "ffocus(this)"/>
          </label><br/>

          <label> Year: <br/>
            <input type="number" name="year" id="year" required onblur = "bblur(this)" onfocus = "ffocus(this)"/>
          </label><br/>


          

          <label> Genre: <br/>
            <select name="Genre" id="Genre" required onblur = "bblur(this)" onfocus = "ffocus(this)" >
              <option value=""></option>
              <option value="Action">Action</option>
              <option value="Horror">Horror</option>
              <option value="Romance">Romance</option>
              <option value="Comedy">Comedy</option>
              <option value="Drama">Drama</option> 
              <option value="Sci-Fi">Science Fiction</option>
            </select>
          </label>
          <br/>

          <label> Rating: </label>
          <div class="star-rating">

            <input type="radio" id="star5" name="rating" value="5">
            <label for="star5" title="5 stars">★</label>
    
            <input type="radio" id="star4"  name="rating" value="4">
            <label for="star4" title="4 stars">★</label>
    
            <input type="radio" id="star3"  name="rating" value="3">
            <label for="star3" title="3 stars">★</label>
    
            <input type="radio" id="star2"  name="rating" value="2">
            <label for="star2" title="2 stars">★</label>
    
            <input type="radio" id="star1"  name="rating" value="1">
            <label for="star1" title="1 star">★</label>

          </div>
          <br/>
          <button type="submit" id="submitButton">Add Movie</button>
        </div>  
      </form>
      <h1>Movie List</h1>
      <div id="movieContainer" class="movie-list"></div>
    </section>
  </body>
  <script>

    function saveToLocal() {

      //get from the form
      const title = document.getElementById('title').value.trim();
      const year = document.getElementById('year').value.trim();
      const genre = document.getElementById('Genre').value.trim();
      let rating;



      if (document.getElementById('star1').checked)
        rating = 1;
      else if (document.getElementById('star2').checked)
        rating = 2;
      else if (document.getElementById('star3').checked)
        rating = 3;
      else if (document.getElementById('star4').checked)
        rating = 4;
      else if (document.getElementById('star5').checked)
        rating = 5;


      //put in object
      const movie = {
        title: title,
        year: year,
        genre: genre,
        rating: rating,
      }



      let movies = JSON.parse(localStorage.getItem('movies')) || [];


      movies.push(movie);
      localStorage.setItem('movies', JSON.stringify(movies));


      loadMovies();


    }    

    function loadMovies() {
      const movies = JSON.parse(localStorage.getItem('movies')) || [];
      movieContainer.innerHTML = ''; // Clear current display

      let moviesHtml = "";

      for (let j = 0; j < movies.length; j++)
      {
        let movie = movies[j];
          
        // Create the star string (e.g., 4 stars -> ★★★★)
        let stars = "";
        for (let i=1; i<=movie.rating; i++)
          stars = stars + '★';

        moviesHtml += `
          <div class="movie-list"><span><strong>${movie.title}</strong> (${movie.year}) - ${movie.genre}, Rating: </span>
          <span class="given-rating">${stars}</span></div>
        `;
        movieContainer.innerHTML = moviesHtml;

      }
      return;
    }

    function confirmSubmission(event){
      if (!(document.getElementById('star5').checked) && !(document.getElementById('star4').checked) && 
          !(document.getElementById('star3').checked) && !(document.getElementById('star2').checked) && !(document.getElementById('star1').checked))
      {
        event.preventDefault();
        alert("Please give a rating");
        return;
      }
      const userConfirmed = confirm("Are you sure you want to submit this form?");
      if (userConfirmed)
      {
        event.preventDefault();
        saveToLocal();
        alert("Form submission saved.");

        //reset the fields for new input
        document.getElementById('year').value = '';
        document.getElementById('title').value = '';
        document.getElementById('Genre').value = '';
        document.getElementById('star1').checked = false;
        document.getElementById('star2').checked = false;
        document.getElementById('star3').checked = false;
        document.getElementById('star4').checked = false;
        document.getElementById('star5').checked = false;                        

      }
    
      if (!userConfirmed) {
          event.preventDefault();
          alert("Form submission cancelled.");
      }
    } 





    function bblur(elem) {
      if (elem.value.trim() === "") {
        elem.classList.remove("focus");
        elem.classList.add("blur");
      } else {
        elem.classList.remove("blur");
      }
    }

    function ffocus(elem) {
      if (elem.value.trim() === "") {
        elem.classList.remove("blur");        
        elem.classList.add("focus");
      } else {
        elem.classList.remove("focus");
      }
    }

    //to load existing data on opening of page
    loadMovies();
  </script>
</html>
